# =============================================================
# Gitleaks configuration — vRoute-Open
# Exclude build artifacts, caches, and known false-positive paths.
# =============================================================

title = "vRoute Gitleaks Config"

[allowlist]
  description = "Ignore build outputs and virtual environments"

  paths = [
    '''target/''',
    '''\.venv/''',
    '''node_modules/''',
    '''\.git/''',
    '''\bdist/''',
    '''__pycache__/''',
    '''surefire-reports/''',
    '''\.m2/''',
  ]
