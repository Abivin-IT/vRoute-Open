# =============================================================
# vRoute Platform — Helm Values Override: PRODUCTION
# Branch: main | Nodes: server cluster
#
# Usage:
#   helm upgrade --install vroute ./80-deploy/helm/vroute \
#     -f ./80-deploy/helm/vroute/values-prod.yaml \
#     --set ingress.host="$PROD_DOMAIN" \
#     --set ingress.extraHosts="{$PROD_DOMAIN_2,$PROD_DOMAIN_3}" \
#     --set postgresql.password="$DB_PASS" \
#     --set vkernel.env.JWT_SECRET="$JWT_SECRET"
#
# IMPORTANT: Do NOT put real domains or secrets here.
#            Pass via --set flags or external secret manager.
# =============================================================

global:
  imagePullPolicy: IfNotPresent # prod uses pinned tags

vkernel:
  image: ghcr.io/abivin/vkernel:latest # tag pinned by CD pipeline
  replicas: 2 # HA across 4 nodes
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  env:
    JWT_SECRET: "OVERRIDE_VIA_CLI"
    JWT_EXPIRATION: "86400000"

vstrategy:
  enabled: true
  image: ghcr.io/abivin/vstrategy:latest
  replicas: 2

postgresql:
  replicas: 1 # single-writer; add pgpool for HA
  password: "OVERRIDE_VIA_CLI"
  storage: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

redis:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  # Primary host — override: --set ingress.host="$PROD_DOMAIN"
  host: app.example.com
  # Alias domains — override: --set ingress.extraHosts="{alias1.example.com}"
  extraHosts: []
  tls:
    enabled: true
    secretName: vroute-prod-tls

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    path: /actuator/prometheus
