# =============================================================
# vRoute Platform — Helm Values Override: PRODUCTION
# Servers: 4-node cluster | Branch: main
# Domains: vroute-5.abivin.com (primary)
#          vroute-5.abivin.vn  (alias)
#          vroute-5.abivin.sg  (alias)
#
# Usage:
#   helm upgrade --install vroute ./80-deploy/helm/vroute \
#     -f ./80-deploy/helm/vroute/values-prod.yaml \
#     --set postgresql.password="$DB_PASS" \
#     --set vkernel.env.JWT_SECRET="$JWT_SECRET"
#
# IMPORTANT: Do NOT put real secrets here — pass via --set or
#            external secret manager (Vault, SOPS, sealed-secrets).
# =============================================================

global:
  imagePullPolicy: IfNotPresent    # prod uses pinned tags

vkernel:
  image: ghcr.io/abivin/vkernel:latest   # tag pinned by CD pipeline
  replicas: 2                             # HA across 4 nodes
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  env:
    JWT_SECRET: "OVERRIDE_VIA_CLI"
    JWT_EXPIRATION: "86400000"

vstrategy:
  enabled: true
  image: ghcr.io/abivin/vstrategy:latest
  replicas: 2

postgresql:
  replicas: 1                             # single-writer; add pgpool for HA
  password: "OVERRIDE_VIA_CLI"
  storage: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

redis:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  # Primary host (used by Helm ingress.yaml template)
  host: vroute-5.abivin.com
  # Additional hosts require multi-host ingress (see values below)
  extraHosts:
    - vroute-5.abivin.vn
    - vroute-5.abivin.sg
  tls:
    enabled: true
    secretName: vroute-prod-tls

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    path: /actuator/prometheus
