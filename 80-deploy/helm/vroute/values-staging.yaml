# =============================================================
# vRoute Platform — Helm Values Override: STAGING
# Branch: staging
#
# Usage:
#   helm upgrade --install vroute ./80-deploy/helm/vroute \
#     -f ./80-deploy/helm/vroute/values-staging.yaml \
#     --set ingress.host="$STAGING_DOMAIN" \
#     --set postgresql.password="$DB_PASS" \
#     --set vkernel.env.JWT_SECRET="$JWT_SECRET"
#
# IMPORTANT: Do NOT put real domains or secrets here.
#            Pass via --set flags or external secret manager.
# =============================================================

global:
  imagePullPolicy: Always          # staging always pulls latest

vkernel:
  image: ghcr.io/abivin/vkernel:staging
  replicas: 1                      # single-node staging
  env:
    JWT_SECRET: "OVERRIDE_VIA_CLI" # helm --set vkernel.env.JWT_SECRET=...
    JWT_EXPIRATION: "86400000"

vstrategy:
  enabled: true
  image: ghcr.io/abivin/vstrategy:staging
  replicas: 1

postgresql:
  password: "OVERRIDE_VIA_CLI"     # helm --set postgresql.password=...
  storage: 5Gi

redis:
  enabled: true

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: staging.example.com      # override: --set ingress.host="$STAGING_DOMAIN"
  tls:
    enabled: true
    secretName: vroute-staging-tls

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /actuator/prometheus
