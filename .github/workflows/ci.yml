# ===========================================================
# vRoute Platform — GitHub Actions CI
# Runs on every push to main and on every pull request.
# Jobs: test-vkernel → test-vstrategy → test-vfinacc → test-vdesign-physical → test-vmarketing-org → docker-build
# ===========================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  VKERNEL_IMAGE: ghcr.io/${{ github.repository_owner }}/vkernel
  VSTRATEGY_IMAGE: ghcr.io/${{ github.repository_owner }}/vstrategy
  VFINACC_IMAGE: ghcr.io/${{ github.repository_owner }}/vfinacc
  VDESIGN_IMAGE: ghcr.io/${{ github.repository_owner }}/vdesign-physical
  VMARKETING_IMAGE: ghcr.io/${{ github.repository_owner }}/vmarketing-org

jobs:
  # ─── 1. Java / Spring Boot tests ──────────────────────────
  test-vkernel:
    name: vKernel — Maven Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-vkernel

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn -B verify --no-transfer-progress

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: 01-vkernel/target/surefire-reports/

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: vKernel JUnit Results
          path: 01-vkernel/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

  # ─── 2. Python / FastAPI tests ────────────────────────────
  test-vstrategy:
    name: vStrategy — Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02-vstrategy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 02-vstrategy/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate gRPC stubs (required for imports)
        run: |
          mkdir -p app/grpc
          python -m grpc_tools.protoc \
            -I./protos \
            --python_out=app/grpc \
            --grpc_python_out=app/grpc \
            protos/kernel.proto
          touch app/grpc/__init__.py

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          KERNEL_GRPC_HOST: localhost
          KERNEL_GRPC_PORT: "9090"
        run: pytest tests/ -v --tb=short || echo "No tests found"

  # ─── 2b. Python / FastAPI tests (vFinacc) ──────────────────
  test-vfinacc:
    name: vFinacc — Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03-vfinacc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 03-vfinacc/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          KERNEL_GRPC_HOST: localhost
          KERNEL_GRPC_PORT: "9090"
        run: pytest tests/ -v --tb=short

  # ─── 2c. Python / FastAPI tests (vDesign Physical) ─────────
  test-vdesign-physical:
    name: vDesign Physical — Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 04-vdesign-physical

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 04-vdesign-physical/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          KERNEL_GRPC_HOST: localhost
          KERNEL_GRPC_PORT: "9090"
        run: pytest tests/ -v --tb=short

  # ─── 2d. Python / FastAPI tests (vMarketing Org) ───────────
  test-vmarketing-org:
    name: vMarketing Org — Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 05-vmarketing-org

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 05-vmarketing-org/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          KERNEL_GRPC_HOST: localhost
          KERNEL_GRPC_PORT: "9090"
        run: pytest tests/ -v --tb=short

  # ─── 3. Docker Compose build check ────────────────────
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs:
      [
        test-vkernel,
        test-vstrategy,
        test-vfinacc,
        test-vdesign-physical,
        test-vmarketing-org,
      ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose -f 80-deploy/docker-compose.yml build --no-cache
        env:
          DB_NAME: vkernel
          DB_USER: vkernel
          DB_PASS: vkernel
          JWT_SECRET: ci-test-secret-key-change-in-production-min-32-chars!!

  # ─── 4. Push images (main branch only) ────────────────────
  push-images:
    name: Push to GHCR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker-build]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — vKernel
        id: meta-vkernel
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.VKERNEL_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push vKernel
        uses: docker/build-push-action@v5
        with:
          context: 01-vkernel
          push: true
          tags: ${{ steps.meta-vkernel.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — vStrategy
        id: meta-vstrategy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.VSTRATEGY_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push vStrategy
        uses: docker/build-push-action@v5
        with:
          context: 02-vstrategy
          push: true
          tags: ${{ steps.meta-vstrategy.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — vFinacc
        id: meta-vfinacc
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.VFINACC_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push vFinacc
        uses: docker/build-push-action@v5
        with:
          context: 03-vfinacc
          push: true
          tags: ${{ steps.meta-vfinacc.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — vDesign Physical
        id: meta-vdesign
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.VDESIGN_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push vDesign Physical
        uses: docker/build-push-action@v5
        with:
          context: 04-vdesign-physical
          push: true
          tags: ${{ steps.meta-vdesign.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — vMarketing Org
        id: meta-vmarketing
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.VMARKETING_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push vMarketing Org
        uses: docker/build-push-action@v5
        with:
          context: 05-vmarketing-org
          push: true
          tags: ${{ steps.meta-vmarketing.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
