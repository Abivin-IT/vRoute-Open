# --- Test profile: uses H2 in-memory, no Postgres required ---
spring:
  datasource:
    url: jdbc:h2:mem:vkernel_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

vkernel:
  jwt:
    secret: test-secret-key-minimum-32-characters-long!!
    expiration-ms: 3600000
  rate-limit:
    enabled: false
  oidc:
    redirect-base: http://localhost:8080
    google:
      client-id: test
      client-secret: test
    microsoft:
      client-id: test
      client-secret: test
    github:
      client-id: test
      client-secret: test

# Disable gRPC server in tests (avoids port 9090 bind conflict)
grpc:
  server:
    port: -1

# Expose actuator endpoints including prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
