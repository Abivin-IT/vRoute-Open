<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vKernel — Event Bus</title>
    <link rel="stylesheet" href="/css/vkernel.css" />
  </head>
  <body>
    <div class="header">
      <h1>&#9881; vKernel</h1>
      <span class="badge">Core OS</span>
      <nav>
        <a href="/">&#8962; Shell</a>
        <a href="/shell">Home</a>
        <a href="/dashboard/appstore">App Store</a>
        <a href="/dashboard/settings">Settings</a>
        <a href="/dashboard/audit">Audit</a>
        <a href="/dashboard/data">vData</a>
        <a href="/dashboard/automation">vFlow</a>
        <a href="/dashboard/monitor">vMonitor</a>
      </nav>
    </div>

    <div class="container">
      <div class="card full">
        <h2>Recent Events (Audit Log)</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Source App</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody>
            {{EVENT_ROWS}}
          </tbody>
        </table>
        {{EMPTY_STATE}}
      </div>
    </div>

    <div class="footer">
      vKernel Core OS &mdash; Corp as Code Platform &copy; Abivin 2025
    </div>
  </body>
</html>
